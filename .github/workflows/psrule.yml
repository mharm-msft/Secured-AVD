name: psrule

on:
  push:
    branches: [main]
    paths:
      - 'bicep/**'
      - 'arm/**'
      - '.github/workflows/psrule.yml'
      - 'ps-rule.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'bicep/**'
      - 'arm/**'
      - '.github/workflows/psrule.yml'
      - 'ps-rule.yaml'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # so SARIF results show up in Code Scanning

jobs:
  analyze:
    name: PSRule for Azure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PSRule for Azure runs PowerShell-based rules against Bicep + ARM source.
      # No Rego authoring required — first-party Microsoft rule set covers
      # AVMsec, Azure Well-Architected, and Cloud Adoption Framework guidance.
      #
      # NOTE on inputPath: the action passes inputPath verbatim to PSRule's
      # -InputPath param. Multiple paths separated by a space get concatenated
      # into one path and silently fail. We omit inputPath entirely so PSRule
      # walks the whole repo, then ps-rule.yaml's input.pathIgnore filters
      # out terraform/, docs/, shared/, .github/.
      #
      # NOTE on baseline: Azure.Default is the rolling baseline maintained by
      # PSRule.Rules.Azure (currently v1.47.0). Quarterly snapshots like
      # Azure.GA_<year>_<month> become obsolete as new ones ship — Azure.Default
      # always tracks the supported rule set without baseline-drift breakage.
      - name: Run PSRule for Azure
        id: psrule
        uses: microsoft/ps-rule@v2.9.0
        with:
          modules: 'PSRule.Rules.Azure'
          baseline: 'Azure.Default'
          outputFormat: Sarif
          outputPath: ps-rule-results.sarif
          summary: true
        continue-on-error: true   # don't block the merge on advisory findings yet

      # Sanity check: detect the "PSRule scanned 0 rules" silent-failure mode
      # we hit on the first run (bad inputPath + obsolete baseline both made
      # the action exit non-zero, but continue-on-error masked it).
      #
      # Truth source: steps.psrule.outcome is the PRE-continue-on-error outcome.
      # 'failure' here means PSRule itself errored (path resolution, module load,
      # bad baseline). If that's set AND there are no findings, it's a silent
      # failure and we should hard-fail the verify step.
      #
      # Note: SARIF's tool.driver.rules array only contains rules that fired,
      # not the full registered rule catalog — counting it is meaningless.
      # We count results (findings) instead.
      - name: Verify PSRule actually ran
        if: always()
        shell: pwsh
        env:
          PSRULE_OUTCOME: ${{ steps.psrule.outcome }}
        run: |
          if (-not (Test-Path ps-rule-results.sarif)) {
            Write-Error "PSRule did not produce a SARIF file. Action failed before execution."
            exit 1
          }
          $sarif = Get-Content ps-rule-results.sarif -Raw | ConvertFrom-Json
          $results = @($sarif.runs[0].results)
          $resultCount = $results.Count
          $outcome = $env:PSRULE_OUTCOME
          $summary = "PSRule outcome: $outcome | findings: $resultCount"
          Write-Host $summary
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## PSRule for Azure"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
          if ($outcome -eq 'failure' -and $resultCount -eq 0) {
            Write-Error "PSRule action failed AND produced no findings — silent-failure detected. Check the 'Run PSRule for Azure' step output above for the real cause (likely a bad path, missing module, or obsolete baseline)."
            exit 1
          }
          if ($resultCount -gt 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Findings by rule"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Rule | Count | Sample message |"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "|---|---|---|"
            $results | Group-Object { $_.rule.id } | Sort-Object Count -Descending | ForEach-Object {
              $sample = $_.Group[0].message.text -replace '\|','\\|'
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| $($_.Name) | $($_.Count) | $sample |"
            }
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Full details available in the Security tab → Code Scanning → PSRule category."
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "_Note: PSRule v2.9 SARIF stores rule IDs under \`result.rule.id\` (nested), not the flat \`result.ruleId\` field._"
          }

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ps-rule-results.sarif
          category: psrule

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ps-rule-results
          path: ps-rule-results.sarif
          retention-days: 30
